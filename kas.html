<!-- ===================== kas.html ===================== -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h3>Kas Harian</h3>

  <form id="formKas" class="row g-2">
    <input type="number" id="jumlah" class="form-control" placeholder="Jumlah">
    <select id="tipe" class="form-control">
      <option value="masuk">Masuk</option>
      <option value="keluar">Keluar</option>
    </select>
    <button class="btn btn-primary">Tambah</button>
  </form>

  <h5 class="mt-3">Saldo: <span id="saldo">0</span></h5>
  <ul id="listKas" class="list-group mt-2"></ul>
</div>

<script src="js/storage.js"></script>
<script>
const formKas = document.getElementById('formKas');
const listKas = document.getElementById('listKas');
const saldoEl = document.getElementById('saldo');

let kas = Storage.get('kas');

function renderKas() {
  listKas.innerHTML = '';
  let saldo = 0;

  kas.forEach(k => {
    const li = document.createElement('li');
    li.className = 'list-group-item';
    li.textContent = `${k.tipe} - ${k.jumlah}`;
    listKas.appendChild(li);

    saldo += k.tipe === 'masuk' ? k.jumlah : -k.jumlah;
  });

  saldoEl.textContent = saldo;
}

formKas.addEventListener('submit', e => {
  e.preventDefault();

  kas.push({
    jumlah: Number(jumlah.value),
    tipe: tipe.value
  });

  Storage.set('kas', kas);
  formKas.reset();
  renderKas();
});

renderKas();
</script>
</body>
</html>
