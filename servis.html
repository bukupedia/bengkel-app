<!-- ===================== servis.html ===================== -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Servis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h3>Riwayat Servis</h3>

  <form id="formServis" class="row g-2">
    <input type="text" id="namaServis" class="form-control" placeholder="Nama">
    <input type="text" id="keterangan" class="form-control" placeholder="Keterangan">
    <button class="btn btn-primary">Simpan</button>
  </form>

  <ul id="listServis" class="list-group mt-3"></ul>
</div>

<script src="js/storage.js"></script>
<script>
const formServis = document.getElementById('formServis');
const listServis = document.getElementById('listServis');

let servis = Storage.get('servis');

function renderServis() {
  listServis.innerHTML = '';
  servis.forEach(s => {
    const li = document.createElement('li');
    li.className = 'list-group-item';
    li.textContent = `${s.nama} - ${s.keterangan}`;
    listServis.appendChild(li);
  });
}

formServis.addEventListener('submit', e => {
  e.preventDefault();

  servis.push({
    nama: namaServis.value,
    keterangan: keterangan.value
  });

  Storage.set('servis', servis);
  formServis.reset();
  renderServis();
});

renderServis();
</script>
</body>
</html>
